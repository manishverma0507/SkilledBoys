<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workers Categories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7c3aed;
      --primary-light: #a78bfa;
      --primary-dark: #5b21b6;
      --accent: #ec4899;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Navbar */
    header {
      background: var(--bg-primary);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .navbar {
      max-width: 1400px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo img {
      height: 44px;
      width: auto;
      transition: transform 0.3s ease;
    }

    .logo img:hover {
      transform: scale(1.05);
    }

    .logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .logo h1 span {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 32px;
      align-items: center;
    }

    nav ul li a {
      text-decoration: none;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 15px;
      transition: color 0.3s ease;
      position: relative;
    }

    nav ul li a:hover {
      color: var(--primary);
    }

    nav ul li a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s ease;
    }

    nav ul li a:hover::after {
      width: 100%;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .login, .register {
      padding: 10px 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .login {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .login:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    .register {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      border: none;
    }

    .register:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 60px auto;
      padding: 60px 24px;
      perspective: 1000px;
    }

    h2 {
      text-align: center;
      font-family: 'Poppins', sans-serif;
      font-size: clamp(28px, 8vw, 44px);
      margin-bottom: 16px;
      color: var(--text-primary);
      font-weight: 800;
      letter-spacing: -1px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 16px;
      margin-bottom: 40px;
      font-weight: 400;
    }

    /* Search bar */
    .search-box {
      text-align: center;
      margin-bottom: 50px;
    }

    .search-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 480px;
    }

    .search-box input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      font-size: 15px;
      border-radius: 14px;
      border: 2px solid var(--border);
      outline: none;
      transition: all 0.3s ease;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 18px;
      pointer-events: none;
    }

    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      background: var(--bg-primary);
    }

    .search-box input::placeholder {
      color: var(--text-secondary);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 24px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .category {
      background: var(--bg-primary);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.5s ease-out backwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .category:nth-child(1) { animation-delay: 0.05s; }
    .category:nth-child(2) { animation-delay: 0.1s; }
    .category:nth-child(3) { animation-delay: 0.15s; }
    .category:nth-child(4) { animation-delay: 0.2s; }
    .category:nth-child(5) { animation-delay: 0.25s; }
    .category:nth-child(n+6) { animation-delay: calc(0.3s + (var(--index) * 0.05s)); }

    .category::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.1) 0%, rgba(236, 72, 153, 0.05) 100%);
      transition: left 0.3s ease;
    }

    .category:hover::before {
      left: 100%;
    }

    .category:hover {
      background: linear-gradient(135deg, var(--bg-primary) 0%, #faf9f9 100%);
      border-color: var(--primary);
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
    }

    .category-icon-wrapper {
      position: relative;
      margin-bottom: 20px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .category img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: 12px;
      background: var(--bg-tertiary);
      padding: 12px;
      transition: all 0.4s ease;
      position: relative;
      z-index: 1;
    }

    .category:hover img {
      transform: scale(1.12) rotate(2deg);
      background: linear-gradient(135deg, #f0e7ff 0%, #fce7f3 100%);
    }

    .category p {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
      position: relative;
      z-index: 1;
      line-height: 1.4;
    }

    /* Hidden state for search */
    .category.hidden {
      display: none;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 20px;
      }

      h2 {
        font-size: 32px;
      }

      .container {
        padding: 40px 20px;
      }

      nav ul {
        gap: 20px;
      }
    }

    @media (max-width: 768px) {
      .navbar {
        flex-wrap: wrap;
        gap: 16px;
      }

      nav {
        width: 100%;
        order: 3;
      }

      nav ul {
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        width: 100%;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 16px;
      }

      h2 {
        font-size: 26px;
      }

      .container {
        padding: 30px 16px;
        margin: 40px auto;
      }

      .login, .register {
        padding: 8px 16px;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .logo h1 {
        font-size: 20px;
      }

      .logo img {
        height: 36px;
      }

      .navbar {
        padding: 12px 16px;
      }

      nav ul li a {
        font-size: 13px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 12px;
      }

      h2 {
        font-size: 22px;
      }

      .category {
        padding: 20px 12px;
      }

      .category img {
        width: 70px;
        height: 70px;
      }

      .category p {
        font-size: 12px;
      }

      .search-box input {
        padding: 12px 16px 12px 40px;
        font-size: 14px;
      }

      .container {
        padding: 24px 12px;
        margin: 24px auto;
      }
    }

    /* No results message */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      font-size: 16px;
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>
<body>

  <!-- Categories Section -->
  <div class="container">
    <h2>Workers Categories</h2>
    <p class="subtitle">Discover skilled professionals across various services</p>

    <!-- Search bar -->
    <div class="search-box">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search categories...">
      </div>
    </div>

    <div class="grid" id="categoryGrid">
      <div class="category"><div class="category-icon-wrapper"><img src="/images/electrician.png" alt="Electrician"></div><p>Electrician</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/plumber.png" alt="Plumber"></div><p>Plumber</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/carpanter.png" alt="Carpenter"></div><p>Carpenter</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/painter.png" alt="Painter"></div><p>Painter</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/maid.png" alt="Maid"></div><p>Maid</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/cook.png" alt="Cook"></div><p>Cook</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/driver.png" alt="Driver"></div><p>Driver</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/garder.png" alt="Gardener"></div><p>Gardener</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/housekeeper.png" alt="Housekeeper"></div><p>Housekeeper</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/cleaner.png" alt="Cleaner"></div><p>Cleaner</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/Interior.png" alt="Interior Designer"></div><p>Interior Designer</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/trainer.png" alt="Fitness Trainer"></div><p>Fitness Trainer</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/Yoga.png" alt="Yoga Instructor"></div><p>Yoga Instructor</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/teacher.png" alt="Teacher"></div><p>Teacher</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/nurse.png" alt="Nurse"></div><p>Nurse</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/baby.png" alt="Babysitter"></div><p>Babysitter</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/gurd.png" alt="Security Guard"></div><p>Security Guard</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/chef.png" alt="Chef"></div><p>Chef</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/builder.png" alt="Builder"></div><p>Builder</p></div>
      <div class="category"><div class="category-icon-wrapper"><img src="/images/labour.png" alt="Labour"></div><p>Labour</p></div>
    </div>
  </div>

  <!-- Script for search filter -->
  <script>
    const searchInput = document.getElementById("searchInput");
    const categories = document.querySelectorAll(".category");
    const categoryGrid = document.getElementById("categoryGrid");

    searchInput.addEventListener("input", function() {
      const query = searchInput.value.toLowerCase();
      let visibleCount = 0;

      categories.forEach(cat => {
        const text = cat.textContent.toLowerCase();
        if (text.includes(query)) {
          cat.classList.remove("hidden");
          visibleCount++;
        } else {
          cat.classList.add("hidden");
        }
      });

      // Show/hide no results message
      const noResults = document.querySelector(".no-results");
      if (visibleCount === 0 && query !== "") {
        if (!noResults) {
          const msg = document.createElement("div");
          msg.className = "no-results";
          msg.textContent = "No categories found. Try a different search.";
          categoryGrid.appendChild(msg);
        }
      } else if (noResults) {
        noResults.remove();
      }
    });
  </script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Login - SkilledBoys</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">Worker Login</h2>
    <form id="loginForm" class="space-y-4">
      <input type="text" name="number" placeholder="Phone Number" required class="w-full p-3 border rounded-lg">
      <input type="password" name="password" placeholder="Password" required class="w-full p-3 border rounded-lg">
      <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">Login</button>
    </form>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      const res = await fetch("https://skilledboys-backend-u54y.onrender.com/api/workers/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      if (result.success) {
  localStorage.setItem("token", result.token); // ✅ Save token
  localStorage.setItem("workerId", result.worker.id); // ✅ Save ID
  window.location.href = "worker-dashboard.html";
} else {
  alert(result.message);
}

    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Skilled Boys</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

  <!-- Card -->
  <div class="bg-white shadow-lg rounded-2xl w-full max-w-md p-8">
    
    <!-- Title -->
    <h2 class="text-2xl md:text-3xl font-extrabold text-center mb-6">
      <span class="text-gray-800">Welcome Back 👋</span><br/>
      <span class="text-purple-600">Login to Skilled Boys</span>
    </h2>

    <!-- Form -->
    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700">📧 Email</label>
        <input type="email" id="email" placeholder="you@example.com" required
          class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">🔒 Password</label>
        <input type="password" id="password" placeholder="••••••••" required
          class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
      </div>

      <!-- Remember & Forgot -->
      <div class="flex items-center justify-between text-sm text-gray-600">
        <label class="flex items-center gap-2">
          <input type="checkbox" class="rounded border-gray-300 text-purple-600 focus:ring-purple-400">
          Remember me
        </label>
        <a href="#" class="text-purple-600 hover:underline">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold text-lg shadow-md transition hover:opacity-90">
        🔑 Login
      </button>
    </form>

    <!-- Divider -->
    <div class="my-6 flex items-center justify-center gap-3 text-gray-400 text-sm">
      <span class="h-px w-16 bg-gray-200"></span>
      OR
      <span class="h-px w-16 bg-gray-200"></span>
    </div>

    <!-- Social Login -->
    <div class="flex gap-3">
      <button class="flex-1 py-2 px-4 border rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50 transition">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5"> Google
      </button>
      <button class="flex-1 py-2 px-4 border rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50 transition">
        <img src="https://www.svgrepo.com/show/494303/facebook-round.svg" alt="Facebook" class="w-5 h-5"> Facebook
      </button>
    </div>

    <!-- Sign up link -->
    <p class="mt-6 text-center text-gray-600 text-sm">
      Don’t have an account? 
      <a href="register.html" class="text-purple-600 font-semibold hover:underline">Sign up</a>
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      
      if (!email || !password) {
        alert('Please fill in both fields.');
        return;
      }

      alert('Login successful!');
      // Replace alert with actual backend login API call
    });
  </script>

</body>
</html>

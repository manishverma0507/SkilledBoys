<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Skilled Boys</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

  <!-- Card -->
  <div class="bg-white shadow-lg rounded-2xl w-full max-w-lg p-8">
    
    <!-- Title -->
    <h2 id="form-title" class="text-2xl md:text-3xl font-extrabold text-center mb-6">
      <span class="text-gray-800">Register as</span>
      <span class="text-purple-600"> Trusted User</span>
    </h2>

    <!-- Toggle -->
    <div class="flex justify-center gap-3 mb-6">
      <button id="userBtn"
        class="flex-1 py-2 rounded-xl font-semibold bg-purple-600 text-white transition hover:bg-purple-700">User</button>
      <button id="workerBtn"
        class="flex-1 py-2 rounded-xl font-semibold bg-gray-100 text-gray-700 transition hover:bg-purple-100">Worker</button>
    </div>

    <!-- Form -->
    <form id="registerForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700">👤 Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required
          class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">📧 Email</label>
        <input type="email" id="email" placeholder="you@example.com" required
          class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">📱 Mobile Number</label>
        <input type="tel" id="phone" placeholder="956535####" required
          class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">🔒 Password</label>
        <input type="password" id="password" placeholder="••••••••" required
          class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">🔑 Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required
          class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">📍 City / Location</label>
        <input type="text" id="location" placeholder="e.g. Delhi" required
          class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
      </div>

      <!-- Worker Fields -->
      <div id="workerFields" class="hidden space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700">🛠️ Service Category</label>
          <select id="category"
            class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none">
            <option value="">-- Select Category --</option>
            <option value="electrician">Electrician</option>
            <option value="plumber">Plumber</option>
            <option value="carpenter">Carpenter</option>
            <option value="maid">Maid</option>
            <option value="cook">Cook</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">📅 Years of Experience</label>
          <input type="number" id="experience" min="0" placeholder="e.g. 2"
            class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">💰 Hourly Rate (INR)</label>
          <input type="number" id="rate" placeholder="e.g. 300"
            class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">🪪 Upload ID Proof</label>
          <input type="file" id="idproof" accept="image/*,application/pdf"
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-xl file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-purple-600 file:text-white hover:file:bg-purple-700" />
        </div>
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold text-lg shadow-md transition hover:opacity-90">
        🚀 Register
      </button>
    </form>
  </div>

  <script>
    const userBtn = document.getElementById('userBtn');
    const workerBtn = document.getElementById('workerBtn');
    const workerFields = document.getElementById('workerFields');
    const formTitle = document.getElementById('form-title');

    userBtn.addEventListener('click', () => {
      userBtn.classList.add('bg-purple-600','text-white');
      userBtn.classList.remove('bg-gray-100','text-gray-700');
      workerBtn.classList.add('bg-gray-100','text-gray-700');
      workerBtn.classList.remove('bg-purple-600','text-white');
      workerFields.classList.add('hidden');
      formTitle.innerHTML = '<span class="text-gray-800">Register as</span> <span class="text-purple-600"> Skilled User</span>';
    });

    workerBtn.addEventListener('click', () => {
      workerBtn.classList.add('bg-purple-600','text-white');
      workerBtn.classList.remove('bg-gray-100','text-gray-700');
      userBtn.classList.add('bg-gray-100','text-gray-700');
      userBtn.classList.remove('bg-purple-600','text-white');
      workerFields.classList.remove('hidden');
      formTitle.innerHTML = '<span class="text-gray-800">Register as</span> <span class="text-purple-600"> Skilled Worker</span>';
    });
  </script>

</body>
</html>
